name: Publish library

# One workflow publishes the Typescript and Python ports of the bells library.
# The three ports (those two plus Java) are kept in version lockstep (see `make
# release-lib`), so a single `v*` tag is one coordinated release: the npm and
# PyPI jobs are two halves of it.
#
# Both registries' Trusted Publishers are configured against THIS file's name
# (publish.yml) — keep the filename stable so those bindings stay valid.
#
# Triggers:
#   - push of a `v*` tag  -> publish npm AND PyPI (a normal lockstep release).
#   - manual dispatch     -> publish PyPI only (npm is gated to tag pushes, since
#                            npm rejects re-publishing an existing version). Use
#                            this for a first/one-off PyPI publish of the version
#                            currently in libs/python/pyproject.toml.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  npm:
    # Only on a tag push; a manual run would try to re-publish an existing
    # npm version and fail.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm install
        working-directory: libs/ts
      - run: npm test
        working-directory: libs/ts
      - run: npm publish --provenance --access public
        working-directory: libs/ts

  pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Run tests
        working-directory: libs/python
        run: |
          python -m pip install -e '.[test]'
          python -m pytest
      - name: Build sdist + wheel
        working-directory: libs/python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: libs/python/dist
