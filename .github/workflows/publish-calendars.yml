name: Publish bhs-calendars to npm

on:
  push:
    tags:
      - 'calendars-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm install
        working-directory: lib
      - name: Validate calendar JSON
        run: lib/src/bin/validate.js bhs-calendars/[0-9][0-9][0-9][0-9]-[0-9][0-9][0-9][0-9].json
      - run: npm publish --provenance --access public
        working-directory: bhs-calendars
