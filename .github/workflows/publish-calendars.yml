name: Publish bhs-calendars

# One workflow publishes every port of the bhs-calendars data package. The ports
# share a version (kept in lockstep by `make release-bhs-calendars`), so a single
# `calendars-v*` tag is one coordinated release across registries.
#
# A shared `validate` job gates BOTH publish jobs (`needs: validate`), so an
# invalid calendar blocks every registry. The npm package publishes the source
# bhs-calendars/ directly; the PyPI package's data is gitignored and copied from
# that same source at build time (`make sync-py-calendars`), so the two can never
# ship different data.
#
# Both registries' Trusted Publishers are configured against THIS file's name
# (publish-calendars.yml) — keep the filename stable so those bindings stay valid.
#
# Triggers:
#   - push of a `calendars-v*` tag -> publish npm AND PyPI.
#   - manual dispatch              -> publish PyPI only (npm is gated to tag
#                                     pushes, since npm rejects re-publishing an
#                                     existing version). Use this for a first or
#                                     one-off PyPI publish of the version in
#                                     libs/python-calendars/pyproject.toml.
on:
  push:
    tags:
      - 'calendars-v*'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install
        working-directory: libs/ts
      - run: npm run build
        working-directory: libs/ts
      - name: Validate calendar JSON (canonical source)
        run: node libs/ts/dist/bin/validate.js bhs-calendars/*-[0-9][0-9][0-9][0-9]-[0-9][0-9][0-9][0-9].json

  npm:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public
        working-directory: bhs-calendars

  pypi:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Materialize calendar data from the canonical source
        run: make sync-py-calendars
      - name: Run tests
        working-directory: libs/python-calendars
        run: |
          python -m pip install -e '.[test]'
          python -m pytest
      - name: Build sdist + wheel
        working-directory: libs/python-calendars
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: libs/python-calendars/dist
